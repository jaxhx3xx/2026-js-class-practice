<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>데이터 타입 : Object</title>
  </head>
  <body>
    <script>
      /* 객체
        - 관련있는 데이터를 하나로 담을 수 있는 데이터 타입
        - 파이썬의 딕셔너리와 유사
        - 순서를 보장하지 않는다 (ES6부터는 보장하려고 노력한다 )
        -{ } 이걸로 표시
        -{ 키(key) : 값(value)} => 키에 숫자가 올 수 없다. => 오류는 안나나, 브라우저가 자동으로 문자열로 바꿈  
        - 값 : ????????? 
        - 키는 유일해야 한다. => 덮어써져서 오류는 X 
        */

      //1. 객체의 작성
      let student = {
        name: "정재희",
        age: "16",
        phone: "010-1111-2222",
        address: "여수",
        //name: "박경은", // 덮었쓰기가 가능하다. 오류는 나지 않지만 덮어씌어져 버림
        //age: 28,
      }; //; 없어도 있어도 상관없음

      //2. 키에 숫자가 올 경우
      let person = {
        111: "처음 수 ",
        222: "두번째 수",
      };
      console.log(student);
      console.log(person);

      //3. 키 값을 가져오기 => Object.keys() => 배열에 넣어온다
      let keys = Object.keys(person);
      console.log(keys); // 배열로 키 값만 나옴
      console.log(keys[0], keys[1]); //111 222
      console.log(keys[0] + keys[1]); //111222

      //4. 값에 접근하기
      let name = student.name; //변수 scope {} 이 name과 저 객체안에 name은 다르다
      console.log(name);

      //5. 객체를 생성하는 다른 방법
      let person2 = {};
      person2.name = "유재석";
      person2.age = 50;
      console.log(person2);

      //6. 매우 중요!! => 특정 키에 접급하는 방법
      // 사용자가 어떤 값을 찾고 싶어하는지 모를 때
      //현업에서는 어떻게 활용할까?

      console.log(student.name); //어떤 값을 불러올지 명확할 때
      console.log(student["name"]); //어떤 값을 불러올지 명확하지 않을 때

      let userInput = prompt("알고 싶은 내용은?(name, age, phone, address)");
      console.log(student[userInput]);

      //7. 객체의 값을 변경 시
      student.name = "김세부";

      //8. 만약 존재하지 않는 키에 접근하려고 하면?
      console.log(student.blood); //undefined 나옴
    </script>
  </body>
</html>
