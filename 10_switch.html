<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>스위치</title>
  </head>
  <body>
    <script>
      // switch : 상수값만 비교
      //Date() 객체 => 인스턴스 객체 now 생성
      const now = new Date();
      console.log(now);
      //getDay() : 요일 리턴 0~6
      let d = now.getDay();
      console.log(d); //2가 출력됨 오늘이 화요일이라서 0: 일요일 1 : 월요일 2: 화요일

      //활용 : 오늘이 무슨 요일인지 리턴하는 조건문
      switch (d) {
        case 0:
          console.log("일요일");
          break;
        case 1:
          console.log("월요일");
          break;
        case 2:
          console.log("화요일");
          break;
        case 3:
          console.log("수요일");
          break;
        case 4:
          console.log("목요일");
          break;
        case 5:
          console.log("금요일");
          break;
        default:
          console.log("토요일");
          break;
      }

      //위의 예제를 두줄로 변환해보자 (조건 : 삼항연산자 쓰지말고)
      let day = [
        "일요일",
        "월요일",
        "화요일",
        "수요일",
        "목요일",
        "금요일",
        "토요일",
      ];
      console.log(day[d]);

      let today = {
        //이렇게 객체 써도 가능
        0: "일",
        1: "월",
        2: "화",
        3: "수",
        4: "목",
        5: "금",
        6: "토",
        7: "일",
      };
      console.log(today[d] + "요일");
    </script>
  </body>
</html>
