<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>for 반목문</title>
  </head>
  <body>
    <script>
      /* 반복문
        1. for : 특정 코드 블록을 정해진 횟수만큼 반복해서 실행하는 문장
        2. 동작원리 및 문법
        for( 1 초기식; 2 조건식; 3 증감식){ 코드 블록 }
        =>1 2 참 코드블록 3 2 참 코드블록 3 2 참 코드블록 3......거짓 종료
        3. iterable객체 (배열) 와 많이 사용
        */
      let brands = ["애플", "구글", "삼성", "마이크로소프트"];
      //   console.log(brands[0]);
      //   console.log(brands[1]);
      //   console.log(brands[2]);
      //   console.log(brands[3]);

      for (let i = 0; i < brands.length; i++) {
        console.log(brands[i]);
      }
      //자판기 음료 리스트 중 동전으로 구입 가능한 음료의 이름을 출력하세요
      let price = 0;
      const drinkList = [
        { name: "오렌지", price: 1000 },
        { name: "파위에이드", price: 1200 },
        { name: "커피", price: 700 },
        { name: "보리음료", price: 1200 },
        { name: "코카콜라", price: 1800 },
      ];

      inputCoin = 1000;
      for (let i = 0; i < drinkList.length; i++) {
        if (inputCoin >= drinkList[i].price) {
          console.log(drinkList[i].name);
        }
      }

      //한 줄 출력 (문자열 합치기)
      let answer = "";
      for (let i = 0; i < drinkList.length; i++) {
        if (inputCoin >= drinkList[i].price) {
          answer += drinkList[i].name + " ";
          console.log(answer);
        }
      }

      //2. 한 줄 출력 -2
      let drinkName = []; // 구입 가능한 음료의 name을 받을 빈 배열
      for (let i = 0; i < drinkList.length; i++) {
        if (inputCoin >= drinkList[i].price) {
          drinkName.push(drinkList[i].name);
        }
      }
      console.log(drinkName.join(" "));

      //break : 조건문이나 반복문을 중단
      for (let i = 0; i < 10; i++) {
        if (i === 5) {
          break;
        }
        console.log(i);
      }

      //continue : 그 단계를 진행하지 않고 다음 step으로 넘어감
      for (let i = 0; i < 10; i++) {
        if (i === 5) {
          continue;
        }
        console.log(i);
      }
    </script>
  </body>
</html>
