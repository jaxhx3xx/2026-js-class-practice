<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>for in</title>
  </head>
  <body>
    <script>
      //for - in : object나 배열에서 사용
      /* for ( let i in 객체이름){
        i : 인덱스
        }*/
      //1. 배열에서 사용하는 경우
      let brands = ["애플", "구글", "삼성", "마이크로소프트", "테슬라"];
      for (let i in brands) {
        console.log(i); //인덱스 확인
        console.log(brands[i]);
      }

      //2. 객체에서 사용하는 경우
      let person = {
        name: "홍길동",
        age: 22,
        tel: "010-0000-1111",
        city: "Seoul",
      };
      //2-1. 키를 출력해보자
      for (const key in person) {
        console.log(key);    
      }
      //2-2. 값 출력
      for (const key in person) {
        console.log(key, " : ", person[key]);
      }
      //2-3. 알고 싶은 값의 키를 입력받아서, 키에 대한 값을 출력하는 코드 작성
      let input = prompt("알고 싶은 값의 키를 입력하세요");
      for (const key in person) {
        if (input) {
          if (key === input) {
            console.log(key, " : ", person[key]);
          }
        } else {
          console.log("올바른 키 입력");
        }
      }
    </script>
  </body>
</html>
