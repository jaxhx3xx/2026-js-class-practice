<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>수행평가 대비</title>
  </head>
  <style>
    body {
      border: 1px solid black;
      width: 500px;
      height: 700px;
    }

    #Orderbutton button {
      background-color: yellow;
    }
    #SearchMenu button {
      background-color: rgb(171, 231, 171);
    }
    .table1 {
      border: 1px solid black;
      width: 400px;
      border-collapse: collapse;
      margin-top: 10px;
    }
    .table1 th {
      border: 1px solid black;
      background-color: rgb(145, 235, 251);
    }
  </style>
  <body>
    <!-- 카페 이름 제목 영역 -->
    <section id="1">
      <div id="cafename">
        <h1 style="font-weight: bold">미림 카페 주문 관리</h1>
      </div>
    </section>

    <!-- 메뉴 선택 영역 -->
    <section id="2">
      <div id="CafeOrder">
        <h2>메뉴선택</h2>
        <label for="menu">메뉴</label>
        <select name="" id="menuList"></select>
      </div>
    </section>

    <!-- 수량 입력 영역 -->
    <div id="quantity">
      <label for="CCC">수량</label>
      <input type="text" id="count" value="1" />
    </div>

    <!-- 주문버튼 영역 -->
    <div id="Orderbutton">
      <button onclick="addOrder()">주문추가</button>
    </div>

    <!-- 메뉴 검색 영역  -->
    <div id="SearchMenu">
      <h2>메뉴검색</h2>
      <input type="text" id="SearchText" placeholder="메뉴명을 입력하세요" />
      <button onclick="findMenu()">검색</button><br />
      <label for="TTT" id="searchResult">검색결과가 여기에 표시됩니다.</label>
    </div>

    <!-- 주문 내역 테이블 영역 -->
    <div id="table">
      <h2>주문내역</h2>
      <table class="table1">
        <thead>
          <th>주문번호</th>
          <th>메뉴명</th>
          <th>단가</th>
          <th>수량</th>
          <th>금액</th>
        </thead>
        <tbody id="orderBody">
          <tr>
            <td>아직 주문내역이 없습니다</td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- 결제 정보 구역 -->
    <div id="information">
      <h2>결제 정보</h2>
      <label id="totalQuantity">총 주문 수량 : </label><br />
      <label id="totalMoeny">총 결제 금액 : </label>
    </div>

    <script>
      const menuList = [
        { name: "아메리카노", price: 3000, category: "coffee" },
        { name: "카페라떼", price: 4000, category: "coffee" },
        { name: "바닐라라떼", price: 4500, category: "coffee" },
        { name: "초코라떼", price: 4200, category: "nonCoffee" },
        { name: "레몬에이드", price: 5000, category: "ade" },
        { name: "자몽에이드", price: 5200, category: "ade" },
      ];
      //메누 선택 옵션 보여주기
      const loadMenu = () => {
        let tags = [];
        for (const menus of menuList) {
          tags.push(
            `<option value = "${menus.name}"> ${menus.name} : ${menus.price}</option>`,
          );
        }
        return tags;
      };
      const selmenuList = loadMenu();
      document.getElementById("menuList").innerHTML = selmenuList.join("");

      // 메뉴검색하고 검색결과 표시하기
      const findMenu = () => {
        const searchInput = document.getElementById("SearchText").value.trim();

        let text = "";
        for (const menus of menuList) {
          if (menus.name === searchInput) {
            text += menus.name + " : " + menus.price;
          }
        }
        if (text === "") text += "그런 메뉴 없습니다.";
        document.getElementById("searchResult").innerText = text;
      };

      // 주문 목록들을 저장해 둘 빈 배열
      const orderList = [];

      let orderNo = 0;
      let totalQty = 0;
      let totalMoney = 0;

      const addOrder = () => {
        //화면에서 선택된 메뉴 이름과 수량 가져오기
        const selectedName = document.getElementById("menuList").value;
        const count = Number(document.getElementById("count").value);

        // 배열에서 일치하는 메뉴 정보 찾기
        let activeMenu = null;
        for (const menus of menuList) {
          if (menus.name === selectedName) {
            activeMenu = menus;
          }
        }

        //주문번호 증가 및 금액 계산
        orderNo++;
        const itemTotal = activeMenu.price * count;
        totalQty += count;
        totalMoney += itemTotal;

        const newOrder = {
          no: orderNo,
          name: activeMenu.name,
          price: activeMenu.price,
          qty: count,
          total: itemTotal,
        };
        orderList.push(newOrder); // 배열에 주문 추가!

        // 4. 변수와 배열을 만들어서 테이블 HTML 채우
        let tags = [];

        // orderList 배열을 돌면서 tr 태그들을 tags 배열에 push합니다.
        for (const order of orderList) {
          tags.push(
            "<tr>" +
              "<td>" +
              order.no +
              "</td>" +
              "<td>" +
              order.name +
              "</td>" +
              "<td>" +
              order.price +
              "원</td>" +
              "<td>" +
              order.qty +
              "</td>" +
              "<td>" +
              order.total +
              "원</td>" +
              "</tr>",
          );
        }

        document.getElementById("orderBody").innerHTML = tags.join("");

        document.getElementById("totalQuantity").innerText =
          "총 주문 수량 : " + totalQty + "개";
        document.getElementById("totalMoeny").innerText =
          "총 결제 금액 : " + totalMoney + "원";
      };
    </script>
  </body>
</html>
